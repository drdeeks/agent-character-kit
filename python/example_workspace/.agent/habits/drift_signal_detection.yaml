name: drift_signal_detection
prompt: In the action I'm about to take, is there a CHARACTER-DRIFT signal — e.g. creating a second file near-identical to an existing one, or contradicting a foundations statement file by file?
enforcement:
  level: should
behavior:
  kind: assertion
  assert: Watch the action itself for drift signals — a near-duplicate file is a positive-policy violation, not a hard-constraint violation. Warn + remind, do not necessarily deny.
  evidence: Near-duplicate creation is flagged as drift (close to a duplication crack); the enforcer reminds affirmatively rather than only blocking.
  logic: Drift is the agent slowly contradicting its own purpose file by file — the disease a deny-only gate cannot stop. Catching the signal early (warn + remind) prevents the rot before it becomes a violation. (Per FOREVER-SYSTEM §6.)
