name: one_concern_per_file
prompt: Does each reference/script file cover ONE concern — or have I mixed unrelated topics into one file that no one can navigate or reuse?
enforcement:
  level: should
behavior:
  kind: assertion
  assert: Each file covers one concern, not mixed topics. References are procedure/schema/example, not vague description; files over 100 lines carry a table of contents.
  evidence: Files are single-purpose and navigable; cross-references point to related concerns instead of cramming them into one blob.
  logic: Mixed-topic files become unmaintainable and un-reusable. One concern per file is what makes a skill's references actually referenceable.
